services:
  - type: web
    name: ai-smart-agriculture-backend
    env: python
    branch: main
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PORT
        value: "10000"
    rootDir: backend

  - type: static_site
    name: ai-smart-agriculture-frontend
    env: static
    branch: main
    buildCommand: "npm install && npm run build"
    publishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        value: ""
